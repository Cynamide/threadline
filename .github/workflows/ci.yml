name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, Test, And Pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check changesets
        run: pnpm changeset status

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Pack local CLI tarball
        run: pnpm pack:local

      - name: Pack publishable packages
        run: pnpm pack:packages
